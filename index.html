<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grimoire</title>

  <style>
    body {
      margin: 0;
      font-family: serif;
      background-image: url('https://texturelabs.org/wp-content/uploads/Texturelabs_Paper_319S.jpg');
    }

    .header {
      height: 70px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background-image: url('https://i.imgur.com/pnhbxGv.jpeg');
      background-size: cover;
      background-position: center;
    }

    .menu-btn {
      font-size: 26px;
      color: white;
      background: none;
      border: none;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
    }

    .menu {
      position: fixed;
      top: 0;
      left: -260px;
      width: auto;
      height: 100%;
      padding: 0.8rem;
      background-image: url('https://texturelabs.org/wp-content/uploads/Texturelabs_Paper_319S.jpg');
      box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      transition: 0.3s;
      overflow-y: auto;
    }

    .menu.open {
      left: 0;
    }

    .overlay.show {
      display: block;
    }

    .page-wrapper {
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .page {
      width: 100%;
      max-width: 340px;
      aspect-ratio: 3/5;
      background: #f5ecd982;
      <!-- border: 1px solid #5a4a3f; -->
      box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 32px;
      text-align: justify;
      line-height: 1.6;
    }

    h2 {
      margin-top: 0;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      border-top: 1px solid #5a4a3f;
    }

    button {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .entry {
      margin-bottom: 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <button class="menu-btn" onclick="openMenu()">☰</button>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="menu" id="menu"></div>

<div class="page-wrapper">
  <div class="page" id="page">
    <div class="content">
      <h2 id="title"></h2>
      <p id="text"></p>
    </div>
    <div class="footer">
      <button onclick="prevPage()">←</button>
      <button onclick="nextPage()">→</button>
    </div>
  </div>
</div>

<script>
  const entries = [
    {
      title: "Heinrich Cornelius Agrippa",
      content: "A German occult writer, author of Three Books of Occult Philosophy."
    },
    {
      title: "Clavicula Salomonis",
      content: "A grimoire attributed to King Solomon, detailing rituals and spirits."
    }
  ];

  let index = 0;

  function render() {
    document.getElementById('title').innerText = entries[index].title;
    document.getElementById('text').innerText = entries[index].content;
  }

  function nextPage() {
    if (index < entries.length - 1) {
      index++;
      render();
    }
  }

  function prevPage() {
    if (index > 0) {
      index--;
      render();
    }
  }

  function openMenu() {
    document.getElementById('menu').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }

  function closeMenu() {
    document.getElementById('menu').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  function buildMenu() {
    const menu = document.getElementById('menu');
    menu.innerHTML = "";

    entries.forEach((e, i) => {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerText = e.title;
      div.onclick = () => {
        index = i;
        render();
        closeMenu();
      };
      menu.appendChild(div);
    });
  }

  // Swipe support
  let startX = 0;

  const page = document.getElementById('page');

  page.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
  });

  page.addEventListener('touchend', (e) => {
    const endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextPage();
    if (endX - startX > 50) prevPage();
  });

  // Init
  buildMenu();
  render();
</script>

</body>
</html>
